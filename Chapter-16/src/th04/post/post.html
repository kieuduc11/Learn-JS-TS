                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">

                            <a class="nav-link" href="../user/user.html">Users</a>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
        <!-- header -->

        <div class="mt-3">
            <div class="d-flex justify-content-between align-items-center my-3">
                <h5>List posts</h5>
                <div>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createPostModal">Create a post</button>
                </div>
            </div>
            <!-- Modal -->
            <!-- Create post modal -->
            <div class="modal fade" id="createPostModal" tabindex="-1" aria-labelledby="createPostModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="createPostModalLabel">Create a post</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="createPostForm">
                                <div class="mb-3">
                                    <label for="titleInput" class="form-label">Title</label>
                                    <input type="text" class="form-control" id="titleInput">
                                </div>
                                <div class="mb-3">
                                    <label for="contentInput" class="form-label">Content</label>
                                    <input type="text" class="form-control" id="contentInput">
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary" id="createPostBtn">Save</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Update post modal -->
            <div class="modal fade" id="updatePostModal" tabindex="-1" aria-labelledby="updatePostModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="updatePostModalLabel">Update a post</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="updatePostForm">
                                <div class="mb-3">
                                    <label for="titleInput1" class="form-label">Title</label>
                                    <input type="text" class="form-control" id="titleInput1">
                                </div>
                                <div class="mb-3">
                                    <label for="contentInput1" class="form-label">Content</label>
                                    <input type="text" class="form-control" id="contentInput1">
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary" id="updatePostBtn">Save</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Modal -->

            <!-- toast mess -->
            <!-- Create -->
            <div class="toast-container position-fixed top-0 end-0 p-3">
                <div id="createPostToast" class="toast text-bg-success" role="alert" aria-live="assertive"
                    aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            Create post successfully!
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                            aria-label="Close"></button>
                    </div>
                </div>
            </div>
            <!-- Delete -->
            <div class="toast-container position-fixed top-0 end-0 p-3">
                <div id="delPostToast" class="toast text-bg-danger" role="alert" aria-live="assertive"
                    aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            Delete post successfully!
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                            aria-label="Close"></button>
                    </div>
                </div>
            </div>
            <!-- Update -->
            <div class="toast-container position-fixed top-0 end-0 p-3">
                <div id="editPostToast" class="toast text-bg-warning" role="alert" aria-live="assertive"
                    aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            Edit post successfully!
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                            aria-label="Close"></button>
                    </div>
                </div>
            </div>
            <!-- toast mess -->

            <!-- Table -->
            <table id="tablePost" class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Title</th>
                        <th scope="col">Content</th>
                        <th scope="col">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- <tr>
                        <th scope="row">1</th>
                        <td>@hoidanit</td>
                        <td>Otto</td>
                        <td>
                            <button class="btn btn-warning">Edit</button>

                        </td>
                    </tr>
                    <tr>
                        <th scope="row">2</th>
                        <td>@hoidanit</td>
                        <td>Thornton</td>
                        <td>
                            <button class="btn btn-warning">Edit</button>
                            <button class="btn btn-danger">Delete</button>
                        </td>
                    </tr> -->
                </tbody>
            </table>
            <!-- Table -->
        </div>
    </div>

    <script type="module" src="../../../dist/th04/post/post.js"></script>

</body>
