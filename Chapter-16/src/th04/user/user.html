        <!-- header -->

        <div class="mt-3">
            <div class="d-flex justify-content-between align-items-center my-3">
                <h5>List users</h5>
                <div>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createUserModal">
                        Create a user
                    </button>
                </div>
            </div>

            <!-- Modal -->
            <!-- Create User modal -->
            <div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="createUserModalLabel">Create a User</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="createUserForm">
                                <div class="mb-3">
                                    <label for="nameInput" class="form-label">Name</label>
                                    <input type="text" class="form-control" id="nameInput">
                                </div>
                                <div class="mb-3">
                                    <label for="emailInput" class="form-label">Email</label>
                                    <input type="text" class="form-control" id="emailInput">
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary" id="createUserBtn">Save</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Update User modal -->
            <div class="modal fade" id="updateUserModal" tabindex="-1" aria-labelledby="updateUserModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="updateUserModalLabel">Update a User</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="updateUserForm">
                                <div class="mb-3">
                                    <label for="nameInput1" class="form-label">Name</label>
                                    <input type="text" class="form-control" id="nameInput1">
                                </div>
                                <div class="mb-3">
                                    <label for="emailInput1" class="form-label">Email</label>
                                    <input type="text" class="form-control" id="emailInput1">
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary" id="updateUserBtn">Save</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Modal -->

            <!-- toast mess -->
            <!-- Create -->
            <div class="toast-container position-fixed top-0 end-0 p-3">
                <div id="createUserToast" class="toast text-bg-success" role="alert" aria-live="assertive"
                    aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            Create user successfully!
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                            aria-label="Close"></button>
                    </div>
                </div>
            </div>
            <!-- Delete -->
            <div class="toast-container position-fixed top-0 end-0 p-3">
                <div id="delUserToast" class="toast text-bg-danger" role="alert" aria-live="assertive"
                    aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            Delete user successfully!
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                            aria-label="Close"></button>
                    </div>
                </div>
            </div>
            <!-- Update -->
            <div class="toast-container position-fixed top-0 end-0 p-3">
                <div id="editUserToast" class="toast text-bg-warning" role="alert" aria-live="assertive"
                    aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            Edit user successfully!
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                            aria-label="Close"></button>
                    </div>
                </div>
            </div>
            <!-- toast mess -->

            <!-- Table -->
            <table id="tableUser" class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Name</th>
                        <th scope="col">Email</th>
                        <th scope="col">Action</th>
                    </tr>
                </thead>
                <tbody>

                        <th scope="row">1</th>
